<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Revision Quiz 📝</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 20px; }
        
        .start-screen, .quiz-screen, .result-screen { display: none; }
        .start-screen.active, .quiz-screen.active, .result-screen.active { display: block; }
        
        .start-screen { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .start-screen h2 { color: #667eea; margin-bottom: 20px; }
        
        .btn { padding: 15px 40px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; background: #667eea; color: white; font-weight: bold; }
        .btn:hover { transform: scale(1.05); }
        
        .quiz-screen { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .progress { display: flex; justify-content: space-between; margin-bottom: 20px; color: #666; }
        .question { font-size: 1.1rem; color: #333; margin-bottom: 20px; line-height: 1.5; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .option:hover { background: #f0f0ff; border-color: #667eea; }
        .option.selected { background: #667eea; color: white; border-color: #5648a8; }
        .option.correct { background: #4CAF50; color: white; border-color: #45a049; }
        .option.wrong { background: #f44336; color: white; border-color: #da190b; }
        
        .next-btn { width: 100%; margin-top: 15px; }
        
        .result-screen { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .score { font-size: 4rem; color: #667eea; font-weight: bold; }
        .score-label { font-size: 1.5rem; color: #666; margin-bottom: 20px; }
        .message { font-size: 1.3rem; color: #333; margin: 20px 0; }
        
        .home-btn { background: #4CAF50; }
        .restart-btn { background: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 English Revision Quiz</h1>
        
        <div class="start-screen active">
            <h2>Units 1-3 Revision</h2>
            <p>20 Questions based on your worksheet</p>
            <p>Good luck!</p>
            <button class="btn" onclick="startQuiz()">Start ▶️</button>
        </div>
        
        <div class="quiz-screen">
            <div class="progress">
                <span>Q<span id="currentQ">1</span>/20</span>
                <span>Score: <span id="score">0</span></span>
            </div>
            <div class="question" id="question">...</div>
            <div class="options" id="options"></div>
            <button class="btn next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Next ▶️</button>
        </div>
        
        <div class="result-screen">
            <div class="score" id="finalScore">0</div>
            <div class="score-label">out of 20</div>
            <div class="message" id="message">...</div>
            <button class="btn restart-btn" onclick="restartQuiz()">Try Again 🔄</button>
            <button class="btn home-btn" onclick="goHome()" style="margin-top:10px">Home 🏠</button>
        </div>
    </div>

    <script>
        const questions = [
            // A. Q&A
            { q: "1. A: How many mangoes are there? B: There ___ mangoes.", options: ["A. is", "B. are", "C. have", "D. has"], answer: 1 },
            { q: "2. A: How many ___ are there? B: I can see ___.", options: ["A. apple / an apple", "B. apples / apples", "C. apples / an apple", "D. an apple / apples"], answer: 2 },
            
            // B. Prepositions (in, on, under)
            { q: "3. The flowers are ___ the grass.", options: ["A. in", "B. on", "C. under", "D. at"], answer: 1 },
            { q: "4. The ball is ___ the box.", options: ["A. in", "B. on", "C. under", "D. at"], answer: 0 },
            { q: "5. The cat is ___ the table.", options: ["A. in", "B. on", "C. under", "D. at"], answer: 2 },
            
            // C. Correct the underlined words (singular/plural)
            { q: "6. 'I have fourteen strawberrys.' → Correct:", options: ["A. strawberry", "B. strawberries", "C. strawberryes", "D. strawberrie"], answer: 1 },
            { q: "7. 'Sam have a toy bus.' → Correct:", options: ["A. Sam have", "B. Sam haves", "C. Sam has", "D. Sam having"], answer: 2 },
            { q: "8. 'I like this teddy bears.' → Correct:", options: ["A. this teddy bear", "B. these teddy bear", "C. these teddy bears", "D. this teddy bears"], answer: 2 },
            { q: "9. 'How many apple are there?' → Correct:", options: ["A. apple are", "B. apples are", "C. apples is", "D. apple is"], answer: 1 },
            { q: "10. 'I can touch a egg.' → Correct:", options: ["A. a egg", "B. an egg", "C. the egg", "D. eggs"], answer: 1 },
            
            // D. Best answers
            { q: "11. I ___ two big ___.", options: ["A. am / pear", "B. have / pears", "C. has / pear", "D. is / pears"], answer: 1 },
            { q: "12. Tom ___ three toy planes.", options: ["A. has", "B. have", "C. is", "D. are"], answer: 0 },
            { q: "13. A: ___ robots are there? B: There is one robot.", options: ["A. What", "B. How many", "C. Where", "D. Who"], answer: 1 },
            { q: "14. ___ balls. ___ big.", options: ["A. I like / It is", "B. I like / They are", "C. I have / It is", "D. These are / They are"], answer: 1 },
            { q: "15. I can ___ 'quack, quack'.", options: ["A. see", "B. hear", "C. smell", "D. taste"], answer: 1 },
            { q: "16. A: ___ that a watermelon? B: No, ___ .", options: ["A. Is that / it is", "B. Is that / it is not", "C. Are those / it is", "D. What / it is not"], answer: 1 },
            
            // E. a, an, some, the
            { q: "17. The bird is in ___ sky.", options: ["A. a", "B. an", "C. the", "D. some"], answer: 2 },
            { q: "18. Alan has ___ orange.", options: ["A. a", "B. an", "C. the", "D. some"], answer: 1 },
            { q: "19. There are ___ grapes.", options: ["A. a", "B. an", "C. the", "D. some"], answer: 3 },
            { q: "20. This is ___ lion.", options: ["A. a", "B. an", "C. the", "D. some"], answer: 0 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        function startQuiz() {
            document.querySelector('.start-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('question').textContent = q.q;
            document.getElementById('score').textContent = score;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                optionsDiv.appendChild(div);
            });
            
            document.getElementById('nextBtn').style.display = 'none';
            selectedAnswer = null;
        }

        function selectOption(i, div) {
            if (selectedAnswer !== null) return;
            selectedAnswer = i;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');
            
            const q = questions[currentQuestion];
            if (i === q.answer) {
                div.classList.add('correct');
                score++;
                document.getElementById('score').textContent = score;
            } else {
                div.classList.add('wrong');
                options[q.answer].classList.add('correct');
            }
            
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showResult() {
            document.querySelector('.quiz-screen').classList.remove('active');
            document.querySelector('.result-screen').classList.add('active');
            document.getElementById('finalScore').textContent = score;
            
            const msg = document.getElementById('message');
            if (score >= 18) {
                msg.textContent = '🎉 Perfect! English Expert!';
            } else if (score >= 15) {
                msg.textContent = '👍 Great job!';
            } else if (score >= 10) {
                msg.textContent = '📚 Good effort!';
            } else {
                msg.textContent = '💪 Keep practicing!';
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.querySelector('.result-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.add('active');
            showQuestion();
        }

        function goHome() {
            currentQuestion = 0;
            score = 0;
            document.querySelector('.result-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.remove('active');
            document.querySelector('.start-screen').classList.add('active');
        }
    </script>
</body>
</html>

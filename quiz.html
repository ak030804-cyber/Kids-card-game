<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey Bee Quiz 🐝</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        
        .start-screen, .quiz-screen, .result-screen { display: none; }
        .start-screen.active, .quiz-screen.active, .result-screen.active { display: block; }
        
        .start-screen { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .start-screen h2 { color: #FF8C00; margin-bottom: 20px; }
        .start-screen p { color: #666; margin-bottom: 15px; }
        
        .btn { padding: 15px 40px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; background: #FF8C00; color: white; font-weight: bold; }
        .btn:hover { transform: scale(1.05); }
        
        .quiz-screen { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .progress { display: flex; justify-content: space-between; margin-bottom: 20px; color: #666; }
        .question { font-size: 1.2rem; color: #333; margin-bottom: 25px; line-height: 1.6; }
        
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .option:hover { background: #FFF8DC; border-color: #FFA500; }
        .option.selected { background: #FFA500; color: white; border-color: #FF8C00; }
        .option.correct { background: #4CAF50; color: white; border-color: #45a049; }
        .option.wrong { background: #f44336; color: white; border-color: #da190b; }
        
        .next-btn { width: 100%; margin-top: 20px; }
        
        .result-screen { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .score { font-size: 4rem; color: #FF8C00; font-weight: bold; }
        .score-label { font-size: 1.5rem; color: #666; margin-bottom: 20px; }
        .message { font-size: 1.3rem; color: #333; margin: 20px 0; }
        
        .home-btn { background: #4CAF50; }
        .restart-btn { background: #FF8C00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐝 Honey Bee Quiz 🐝</h1>
        
        <div class="start-screen active">
            <h2>Test Your Bee Knowledge!</h2>
            <p>This quiz has 20 questions about honey bees</p>
            <p>Each question has 4 choices</p>
            <p><strong>Let's see how much you know! 📈</strong></p>
            <button class="btn" onclick="startQuiz()">Start Quiz ▶️</button>
        </div>
        
        <div class="quiz-screen">
            <div class="progress">
                <span>Question <span id="currentQ">1</span>/20</span>
                <span>Score: <span id="score">0</span></span>
            </div>
            <div class="question" id="question">Question...</div>
            <div class="options" id="options"></div>
            <button class="btn next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Next ▶️</button>
        </div>
        
        <div class="result-screen">
            <div class="score" id="finalScore">0</div>
            <div class="score-label">out of 20</div>
            <div class="message" id="message">...</div>
            <button class="btn restart-btn" onclick="restartQuiz()">Try Again 🔄</button>
            <button class="btn home-btn" onclick="goHome()" style="margin-top:10px">Home 🏠</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "1. The honey bee is a type of ___.", options: ["A. Mammal", "B. Insect", "C. Bird", "D. Reptile"], answer: 1 },
            { q: "2. The honey bee is a ___.", options: ["A. Herbivore", "B. Carnivore", "C. Omnivore", "D. Pollinator"], answer: 3 },
            { q: "3. The bee has ___.", options: ["A. 2 legs", "B. 4 legs", "C. 6 legs", "D. 8 legs"], answer: 2 },
            { q: "4. The bee uses the ___ for pollination.", options: ["A. Wings only", "B. Legs only", "C. Body and wings", "D. Stinger only"], answer: 2 },
            { q: "5. Honey bees live in ___.", options: ["A. Hives", "B. Burrows", "C. Nests in trees", "D. Both A and C"], answer: 3 },
            { q: "6. The three types of bees are ___.", options: ["A. Queen, King, Worker", "B. Queen, Drone, Worker", "C. Male, Female, Baby", "D. King, Prince, Worker"], answer: 1 },
            { q: "7. The queen bee's job is to ___.", options: ["A. Make honey", "B. Protect the hive", "C. Lay eggs", "D. Collect pollen"], answer: 2 },
            { q: "8. Worker bees are ___.", options: ["A. Male", "B. Female", "C. Both male and female", "D. Neither"], answer: 1 },
            { q: "9. Drones are ___.", options: ["A. Female bees", "B. Male bees", "C. Baby bees", "D. Queen bees"], answer: 1 },
            { q: "10. Worker bees collect ___.", options: ["A. Only pollen", "B. Only nectar", "C. Both pollen and nectar", "D. Only water"], answer: 2 },
            { q: "11. Honey is made from ___.", options: ["A. Pollen", "B. Nectar", "C. Wax", "D. Propolis"], answer: 1 },
            { q: "12. Bees have ___ pairs of wings.", options: ["A. 1", "B. 2", "C. 3", "D. 4"], answer: 1 },
            { q: "13. The bee's body has ___ main parts.", options: ["A. 2", "B. 3", "C. 4", "D. 5"], answer: 1 },
            { q: "14. The three main body parts are ___.", options: ["A. Head, Thorax, Abdomen", "B. Head, Body, Tail", "C. Eyes, Wings, Legs", "D. Antenna, Thorax, Wings"], answer: 0 },
            { q: "15. Bees can see ___.", options: ["A. Only black and white", "B. All colors", "C. UV light", "D. Infrared"], answer: 2 },
            { q: "16. The worker bee's wings beat ___ times per second.", options: ["A. 50", "B. 200", "C. 500", "D. 1000"], answer: 1 },
            { q: "17. A bee can fly up to ___ km per hour.", options: ["A. 5", "B. 15", "C. 25", "D. 50"], answer: 2 },
            { q: "18. The bee's stinger is part of its ___.", options: ["A. Head", "B. Thorax", "C. Abdomen", "D. Legs"], answer: 2 },
            { q: "19. ___ are necessary for plants to make fruits and seeds.", options: ["A. Wind", "B. Rain", "C. Pollinators", "D. Sunlight"], answer: 2 },
            { q: "20. Bees help humans by ___.", options: ["A. Making honey only", "B. Pollinating crops", "C. Both honey and pollination", "D. Nothing"], answer: 2 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        function startQuiz() {
            document.querySelector('.start-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('question').textContent = q.q;
            document.getElementById('score').textContent = score;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.onclick = () => selectOption(i, div);
                optionsDiv.appendChild(div);
            });
            
            document.getElementById('nextBtn').style.display = 'none';
            selectedAnswer = null;
        }

        function selectOption(i, div) {
            if (selectedAnswer !== null) return;
            selectedAnswer = i;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            div.classList.add('selected');
            
            const q = questions[currentQuestion];
            if (i === q.answer) {
                div.classList.add('correct');
                score++;
                document.getElementById('score').textContent = score;
            } else {
                div.classList.add('wrong');
                options[q.answer].classList.add('correct');
            }
            
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showResult() {
            document.querySelector('.quiz-screen').classList.remove('active');
            document.querySelector('.result-screen').classList.add('active');
            document.getElementById('finalScore').textContent = score;
            
            const msg = document.getElementById('message');
            if (score >= 18) {
                msg.textContent = '🎉 Amazing! You are a Bee Expert!';
            } else if (score >= 12) {
                msg.textContent = '👍 Good job! Keep learning!';
            } else if (score >= 6) {
                msg.textContent = '📚 Try again to learn more!';
            } else {
                msg.textContent = '💪 Study more about bees!';
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.querySelector('.result-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.add('active');
            showQuestion();
        }

        function goHome() {
            currentQuestion = 0;
            score = 0;
            document.querySelector('.result-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.remove('active');
            document.querySelector('.start-screen').classList.add('active');
        }
    </script>
</body>
</html>

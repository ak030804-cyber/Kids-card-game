<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻牌認字遊戲 🎮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Microsoft JhengHei',cursive,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;overflow-x:hidden}
.container{max-width:1200px;margin:0 auto}
header{text-align:center;margin-bottom:30px;color:white;text-shadow:3px 3px 6px rgba(0,0,0,0.3)}
h1{font-size:clamp(2rem,5vw,3.5rem);margin-bottom:10px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.subtitle{font-size:clamp(1rem,2vw,1.5rem);opacity:0.9}
.controls{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap}
.btn{padding:15px 30px;font-size:clamp(1rem,2vw,1.3rem);border:none;border-radius:50px;cursor:pointer;font-family:inherit;font-weight:bold;transition:all 0.3s ease;box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.btn-reset{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white}
.btn-custom{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);color:white}
.btn:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 25px rgba(0,0,0,0.4)}
.btn:active{transform:translateY(0) scale(1)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;padding:20px;max-width:1000px;margin:0 auto}
.card{aspect-ratio:1;perspective:1000px;cursor:pointer;position:relative}
.card-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:clamp(2rem,5vw,3rem);font-weight:bold;padding:10px;overflow:hidden}
.card-front{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);color:#ff6b6b;border:4px solid #ff6b6b}
.card-front::after{content:'?';font-size:clamp(3rem,8vw,5rem);opacity:0.5}
.card-back{background:white;transform:rotateY(180deg);border:4px solid #4ecdc4}
.card-back img{max-width:90%;max-height:90%;object-fit:contain;border-radius:10px}
.card-back .text-content{color:#4ecdc4;text-align:center;line-height:1.3;font-size:clamp(1.5rem,4vw,2.5rem)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal.active{display:flex}
.modal-content{background:white;border-radius:30px;padding:30px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-header{text-align:center;margin-bottom:20px}
.modal-header h2{color:#667eea;font-size:2rem}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;color:#333;font-weight:bold;font-size:1.1rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;border:3px solid #ddd;border-radius:15px;font-size:1rem;font-family:inherit;transition:border-color 0.3s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea}
.card-preview{width:100px;height:100px;margin:10px auto;border-radius:15px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border:3px solid #667eea;overflow:hidden}
.card-preview img{max-width:90%;max-height:90%;object-fit:contain}
.card-preview .preview-text{font-size:2rem;color:#667eea}
.card-list{margin-top:20px}
.card-item{display:flex;align-items:center;gap:15px;padding:15px;background:#f8f9fa;border-radius:15px;margin-bottom:10px}
.card-item-number{width:40px;height:40px;background:#667eea;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold}
.card-item-content{flex:1;font-size:1.1rem}
.card-item-delete{background:#ff6b6b;color:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.2rem}
.modal-footer{display:flex;gap:15px;margin-top:20px;justify-content:center}
.btn-save{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:white}
.btn-close{background:#ddd;color:#333}
.sound-toggle{position:fixed;top:20px;right:20px;background:white;border:none;width:60px;height:60px;border-radius:50%;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:100}
.confetti{position:fixed;width:10px;height:10px;background:#f00;animation:confetti-fall 3s linear forwards;z-index:9999}
@keyframes confetti-fall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media(max-width:600px){.cards-grid{grid-template-columns:repeat(2,1fr);gap:15px;padding:10px}.controls{gap:10px}.btn{padding:12px 20px;font-size:1rem}}
</style>
</head>
<body>
<button class="sound-toggle" id="soundToggle">🔊</button>
<div class="container">
<header><h1>🎯 翻牌認字遊戲 🎯</h1><p class="subtitle">點擊卡片，學習新字詞！</p></header>
<div class="controls"><button class="btn btn-reset" onclick="resetGame()">🔄 重置遊戲</button><button class="btn btn-custom" onclick="openCustomMode()">✏️ 自定義卡片</button></div>
<div class="cards-grid" id="cardsGrid"></div>
</div>
<div class="modal" id="customModal">
<div class="modal-content">
<div class="modal-header"><h2>✏️ 自定義卡片</h2></div>
<div class="form-group"><label for="cardNumber">選擇卡片編號：</label><select id="cardNumber"><option value="0">卡片 1</option><option value="1">卡片 2</option><option value="2">卡片 3</option><option value="3">卡片 4</option><option value="4">卡片 5</option><option value="5">卡片 6</option><option value="6">卡片 7</option><option value="7">卡片 8</option><option value="8">卡片 9</option><option value="9">卡片 10</option></select></div>
<div class="form-group"><label for="contentType">內容類型：</label><select id="contentType" onchange="toggleContentType()"><option value="text">文字</option><option value="image">圖片</option></select></div>
<div class="form-group" id="textGroup"><label for="textContent">文字內容：</label><textarea id="textContent" rows="3" placeholder="輸入要顯示的文字（例如：貓、狗、蘋果...）"></textarea></div>
<div class="form-group" id="imageGroup" style="display:none;"><label for="imageUrl">圖片網址：</label><input type="text" id="imageUrl" placeholder="輸入圖片的網址（例如：https://example.com/cat.jpg）"><p style="margin-top:8px;color:#666;font-size:0.9rem">💡 提示：可以使用網絡圖片網址，或將圖片放在同一資料夾後輸入檔名</p></div>
<div class="form-group"><label>預覽：</label><div class="card-preview" id="cardPreview"><span class="preview-text">?</span></div></div>
<div class="card-list" id="cardList"></div>
<div class="modal-footer"><button class="btn btn-save" onclick="saveCard()">💾 儲存卡片</button><button class="btn btn-close" onclick="closeModal()">❌ 關閉</button></div>
</div>
</div>
<script>
const defaultConfig={cards:[{type:'text',content:'貓',color:'#FF6B6B'},{type:'text',content:'狗',color:'#4ECDC4'},{type:'text',content:'鳥',color:'#45B7D1'},{type:'text',content:'魚',color:'#96CEB4'},{type:'text',content:'花',color:'#FFEAA7'},{type:'text',content:'樹',color:'#DDA0DD'},{type:'text',content:'日',color:'#FFB6C1'},{type:'text',content:'月',color:'#87CEEB'},{type:'text',content:'星',color:'#F0E68C'},{type:'text',content:'雲',color:'#B0E0E6'}],soundEnabled:true,flipDelay:2000};
let config=JSON.parse(localStorage.getItem('cardGameConfig'))||defaultConfig;
let flipTimeouts=[];
let soundEnabled=config.soundEnabled!==false;
function playSound(name){if(soundEnabled){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=name==='flip'?440:660;osc.type='sine';gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);}catch(e){}}}
function createConfetti(){const colors=['#ff6b6b','#4ecdc4','#45b7d1','#ffeaa7','#dda0dd','#f0e68c'];for(let i=0;i<30;i++){const confetti=document.createElement('div');confetti.className='confetti';confetti.style.left=Math.random()*100+'vw';confetti.style.background=colors[Math.floor(Math.random()*colors.length)];confetti.style.animationDuration=(2+Math.random()*2)+'s';document.body.appendChild(confetti);setTimeout(()=>confetti.remove(),4000);}}
function renderCards(){const grid=document.getElementById('cardsGrid');grid.innerHTML='';config.cards.forEach((card,index)=>{const cardEl=document.createElement('div');cardEl.className='card';const content=card.type==='image'?`<img src="${card.content}" alt="卡片${index+1}">`:`<span class="text-content" style="color:${card.color||'#4ecdc4'}">${card.content}</span>`;cardEl.innerHTML=`<div class="card-inner"><div class="card-front"></div><div class="card-back">${content}</div></div>`;cardEl.onclick=()=>flipCard(cardEl,index);grid.appendChild(cardEl);});}
function flipCard(cardEl,index){if(cardEl.classList.contains('flipped'))return;cardEl.classList.add('flipped');playSound('flip');if(flipTimeouts[index])clearTimeout(flipTimeouts[index]);flipTimeouts[index]=setTimeout(()=>{cardEl.classList.remove('flipped');playSound('success');if(index===config.cards.length-1)createConfetti();},config.flipDelay);}
function resetGame(){document.querySelectorAll('.card').forEach(c=>c.classList.remove('flipped'));flipTimeouts.forEach(t=>clearTimeout(t));flipTimeouts=[];playSound('flip');}
function openCustomMode(){document.getElementById('customModal').classList.add('active');updateCardList();}
function closeModal(){document.getElementById('customModal').classList.remove('active');}
function toggleContentType(){const type=document.getElementById('contentType').value;document.getElementById('textGroup').style.display=type==='text'?'block':'none';document.getElementById('imageGroup').style.display=type==='image'?'block':'none';updatePreview();}
function updatePreview(){const type=document.getElementById('contentType').value;const preview=document.getElementById('cardPreview');const cardNum=parseInt(document.getElementById('cardNumber').value);const card=config.cards[cardNum];if(type==='text'){const text=document.getElementById('textContent').value||card?.content||'?';preview.innerHTML=`<span class="preview-text" style="color:${card?.color||'#667eea'}">${text}</span>`;}else{const url=document.getElementById('imageUrl').value||card?.content||'';preview.innerHTML=url?`<img src="${url}" alt="預覽">`:`<span class="preview-text">?</span>`;}}
function updateCardList(){const list=document.getElementById('cardList');list.innerHTML='';config.cards.forEach((card,index)=>{const item=document.createElement('div');item.className='card-item';const content=card.type==='image'?`🖼️ 圖片`:`📝 ${card.content}`;item.innerHTML=`<div class="card-item-number">${index+1}</div><div class="card-item-content">${content}</div><button class="card-item-delete" onclick="resetCard(${index})">🗑️</button>`;list.appendChild(item);});}
function resetCard(index){config.cards[index]={type:'text',content:'新字詞',color:'#'+Math.floor(Math.random()*16777215).toString(16)};localStorage.setItem('cardGameConfig',JSON.stringify(config));renderCards();updateCardList();playSound('flip');}
function saveCard(){const cardNum=parseInt(document.getElementById('cardNumber').value);const type=document.getElementById('contentType').value;const card={type,color:'#'+Math.floor(Math.random()*16777215).toString(16)};if(type==='text'){card.content=document.getElementById('textContent').value||'新字詞';}else{card.content=document.getElementById('imageUrl').value||'image.jpg';}config.cards[cardNum]=card;localStorage.setItem('cardGameConfig',JSON.stringify(config));renderCards();updateCardList();closeModal();playSound('success');createConfetti();}
document.getElementById('soundToggle').onclick=function(){soundEnabled=!soundEnabled;this.textContent=soundEnabled?'🔊':'🔇';};
document.getElementById('textContent').oninput=updatePreview;
document.getElementById('imageUrl').oninput=updatePreview;
document.getElementById('cardNumber').onchange=()=>{const val=parseInt(document.getElementById('cardNumber').value);document.getElementById('contentType').value=config.cards[val]?.type||'text';document.getElementById('textContent').value=config.cards[val]?.type==='text'?config.cards[val].content:'';document.getElementById('imageUrl').value=config.cards[val]?.type==='image'?config.cards[val].content:'';toggleContentType();};
renderCards();
</script>
</body>
</html>

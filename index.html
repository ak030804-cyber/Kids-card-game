<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻牌認字遊戲 🎮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', 'Microsoft JhengHei', cursive, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 10px;
      animation: bounce 1s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .subtitle {
      font-size: clamp(1rem, 2vw, 1.5rem);
      opacity: 0.9;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 15px 30px;
      font-size: clamp(1rem, 2vw, 1.3rem);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .btn-reset {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    .btn-custom {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 20px;
      height: 180px;
      perspective: 1000px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
    }
    .card-front {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 3rem;
    }
    .card-back {
      background: white;
      transform: rotateY(180deg);
      font-size: 2.5rem;
      font-weight: bold;
      color: #333;
    }
    .card-back img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }
    .admin-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: white;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    .admin-indicator {
      display: none;
      position: fixed;
      top: 90px;
      left: 20px;
      background: #ff6b6b;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: bold;
      z-index: 999;
    }
    .admin-indicator.show { display: block; }
    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
      .card { height: 140px; }
      .card-front { font-size: 2rem; }
      .card-back { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <button class="admin-btn" id="adminBtn" title="管理員設定">⚙️</button>
  <div class="admin-indicator" id="adminIndicator">🔧 管理員模式</div>

  <div class="container">
    <header>
      <h1>🎯 翻牌認字遊戲 🎯</h1>
      <p class="subtitle">點擊卡片，學習新字詞！</p>
    </header>
    <div class="controls">
      <button class="btn btn-reset" onclick="resetGame()">🔄 重置遊戲</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <script>
    // 配置數據
    const defaultConfig = {
      cards: [
        { type: 'text', content: '貓', color: '#FF6B6B' },
        { type: 'text', content: '狗', color: '#4ECDC4' },
        { type: 'text', content: '鳥', color: '#45B7D1' },
        { type: 'text', content: '魚', color: '#96CEB4' },
        { type: 'text', content: '花', color: '#FFEAA7' },
        { type: 'text', content: '樹', color: '#DDA0DD' },
        { type: 'text', content: '日', color: '#FFB6C1' },
        { type: 'text', content: '月', color: '#87CEEB' },
        { type: 'text', content: '星', color: '#F0E68C' },
        { type: 'text', content: '雲', color: '#B0E0E6' }
      ],
      flipDelay: 2000
    };

    // 初始化配置
    let config = JSON.parse(localStorage.getItem('cardGameConfig')) || defaultConfig;
    let flipTimeouts = [];
    let adminMode = false;
    const ADMIN_PASSWORD = 'admin123';

    // 渲染卡片
    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      grid.innerHTML = '';
      
      config.cards.forEach((card, index) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        if (adminMode) cardEl.classList.add('admin-mode');

        let content = '';
        if (card.type === 'image') {
          content = `<img src="${card.content}" alt="卡片${index+1}">`;
        } else {
          content = `<span style="color: ${card.color || '#4ecdc4'}">${card.content}</span>`;
        }

        cardEl.innerHTML = `
          <div class="card-inner">
            <div class="card-front">🎴</div>
            <div class="card-back">${content}</div>
          </div>
        `;

        cardEl.onclick = () => flipCard(cardEl, index);
        grid.appendChild(cardEl);
      });
    }

    // 翻牌功能
    function flipCard(cardEl, index) {
      if (cardEl.classList.contains('flipped')) return;
      
      cardEl.classList.add('flipped');
      
      if (flipTimeouts[index]) clearTimeout(flipTimeouts[index]);
      flipTimeouts[index] = setTimeout(() => {
        cardEl.classList.remove('flipped');
        if (index === config.cards.length - 1) {
          createConfetti();
        }
      }, config.flipDelay);
    }

    // 重置遊戲
    function resetGame() {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
      flipTimeouts.forEach(t => clearTimeout(t));
      flipTimeouts = [];
    }

    // 彩帶效果
    function createConfetti() {
      const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffeaa7', '#dda0dd'];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.style.cssText = `
          position: fixed;
          width: 10px;
          height: 10px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          left: ${Math.random() * 100}vw;
          top: -10px;
          z-index: 9999;
          animation: confettiFall ${2 + Math.random() * 2}s linear forwards;
        `;
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }
      
      const style = document.createElement('style');
      style.textContent = `
        @keyframes confettiFall {
          to {
            transform: translateY(100vh) rotate(720deg);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    }

    // 管理員功能
    document.getElementById('adminBtn').onclick = function() {
      const password = prompt('請輸入管理員密碼：');
      if (password === ADMIN_PASSWORD) {
        adminMode = !adminMode;
        const indicator = document.getElementById('adminIndicator');
        indicator.classList.toggle('show', adminMode);
        renderCards();
        alert(adminMode ? '✅ 進入管理員模式' : '✅ 退出管理員模式');
      } else if (password !== null) {
        alert('❌ 密碼錯誤！');
      }
    };

    // 初始化
    renderCards();
  </script>
</body>
</html>
